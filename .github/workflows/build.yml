name: Build SpotifyCraft Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Find and fix gradlew
        run: |
          find . -name "gradlew" -type f
          GRADLEW=$(find . -name "gradlew" -type f | head -1)
          echo "Found: $GRADLEW"
          chmod +x "$GRADLEW"
          echo "GRADLEW_PATH=$GRADLEW" >> $GITHUB_ENV

      - name: Build mod
        run: ${{ env.GRADLEW_PATH }} build

      - uses: actions/upload-artifact@v4
        with:
          name: SpotifyCraft-mod
          path: "**/build/libs/spotifycraft-*.jar"
